<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akatsuki PhD Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0c;
            color: #e6e6e6;
            font-family: 'Segoe UI', system-ui;
            padding: 20px;
        }
        
        .header {
            background: #111113;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2d;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            background: #1a1a1e;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .xp-bar-container {
            background: #111113;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        
        .xp-bar {
            height: 8px;
            background: #1a1a1e;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .xp-fill {
            height: 100%;
            background: #d62828;
            width: 0%;
            transition: width 0.3s;
        }
        
        .mission-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .mission-card {
            background: #111113;
            border-left: 4px solid #d62828;
            border-radius: 8px;
            padding: 15px;
        }
        
        .mission-title {
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .mission-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        
        .step-list {
            list-style: none;
            margin-top: 10px;
        }
        
        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            cursor: pointer;
        }
        
        .step-item.completed label {
            text-decoration: line-through;
            color: #888;
        }
        
        .step-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #d62828;
        }
        
        button {
            background: #d62828;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #d62828;
            padding: 10px 20px;
            border-radius: 8px;
            transform: translateX(400px);
            transition: transform 0.3s;
        }
        
        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>🌙 AKATSUKI QUEST</div>
        <div class="stats">
            <div class="stat">LVL <span id="level">1</span></div>
            <div class="stat">⭐ <span id="xp">0</span> XP</div>
            <div class="stat">💰 <span id="coins">150</span></div>
            <div class="stat">🔥 <span id="streak">0</span></div>
        </div>
    </div>
    
    <div class="xp-bar-container">
        <div class="xp-bar">
            <div class="xp-fill" id="xpFill"></div>
        </div>
        <div style="font-size: 12px; text-align: right; margin-top: 5px;">
            <span id="xpCurrent">0</span> / <span id="xpNext">500</span> XP to Level <span id="nextLevel">2</span>
        </div>
    </div>
    
    <h2>📋 ACTIVE MISSIONS</h2>
    <div id="missionList" class="mission-list"></div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // ============================================================
        // SIMPLE WORKING VERSION - NO EXTERNAL DEPENDENCIES
        // ============================================================
        
        console.log('Script starting...');
        
        // State
        let state = {
            xp: 0,
            coins: 150,
            level: 1,
            streak: 0,
            activeTasks: [],
            completedHistory: []
        };
        
        // Daily tasks
        const DAILY_TASKS = [
            { 
                id: 'task_1', 
                title: "Morning Startup Ritual", 
                domain: "Rituals", 
                difficulty: "Easy", 
                xp: 10, 
                steps: [
                    { text: "Open mission board", completed: false },
                    { text: "Review today's calendar", completed: false },
                    { text: "Pick top 3 priorities", completed: false },
                    { text: "Start first block", completed: false }
                ]
            },
            { 
                id: 'task_2', 
                title: "Daily Mission Log", 
                domain: "Documentation", 
                difficulty: "Easy", 
                xp: 15, 
                steps: [
                    { text: "Write what you accomplished", completed: false },
                    { text: "Note any blockers", completed: false },
                    { text: "Record tomorrow's first task", completed: false }
                ]
            },
            { 
                id: 'task_3', 
                title: "Shutdown Ritual", 
                domain: "Rituals", 
                difficulty: "Easy", 
                xp: 10, 
                steps: [
                    { text: "Review completed tasks", completed: false },
                    { text: "Clear workspace", completed: false },
                    { text: "Set tomorrow's first action", completed: false }
                ]
            }
        ];
        
        // Helper functions
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function saveState() {
            localStorage.setItem('akatsuki_state', JSON.stringify(state));
            console.log('State saved');
        }
        
        function loadState() {
            const saved = localStorage.getItem('akatsuki_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                    console.log('State loaded', state);
                } catch(e) { console.error(e); }
            }
            
            // Add daily tasks if no active tasks
            if (state.activeTasks.length === 0) {
                state.activeTasks = JSON.parse(JSON.stringify(DAILY_TASKS));
                console.log('Added default tasks');
            }
            
            updateXPLevel();
            saveState();
        }
        
        function updateXPLevel() {
            const xpPerLevel = 500;
            const newLevel = Math.floor(state.xp / xpPerLevel) + 1;
            if (newLevel > state.level) {
                state.coins += 100;
                showToast(`✨ Level Up! Level ${newLevel}! +100 coins`);
            }
            state.level = newLevel;
            updateXPBar();
        }
        
        function updateXPBar() {
            const xpPerLevel = 500;
            const currentLevelXp = (state.level - 1) * xpPerLevel;
            const nextLevelXp = state.level * xpPerLevel;
            const progress = ((state.xp - currentLevelXp) / (nextLevelXp - currentLevelXp)) * 100;
            
            const xpFill = document.getElementById('xpFill');
            if (xpFill) xpFill.style.width = `${Math.min(100, Math.max(0, progress))}%`;
            
            const xpCurrent = document.getElementById('xpCurrent');
            const xpNext = document.getElementById('xpNext');
            const nextLevelSpan = document.getElementById('nextLevel');
            if (xpCurrent) xpCurrent.innerText = state.xp;
            if (xpNext) xpNext.innerText = nextLevelXp;
            if (nextLevelSpan) nextLevelSpan.innerText = state.level + 1;
            
            const levelSpan = document.getElementById('level');
            const xpSpan = document.getElementById('xp');
            const coinsSpan = document.getElementById('coins');
            if (levelSpan) levelSpan.innerText = state.level;
            if (xpSpan) xpSpan.innerText = state.xp;
            if (coinsSpan) coinsSpan.innerText = state.coins;
        }
        
        function updateTaskCompletion(task) {
            const allStepsDone = task.steps.every(s => s.completed);
            if (allStepsDone && !task.completed) {
                completeTask(task.id);
            }
        }
        
        function completeTask(taskId) {
            const task = state.activeTasks.find(t => t.id === taskId);
            if (!task || task.completed) return;
            
            const xpGain = task.xp;
            const coinGain = Math.floor(xpGain * 0.2);
            
            task.completed = true;
            task.finishedAt = new Date().toISOString();
            state.xp += xpGain;
            state.coins += coinGain;
            
            state.completedHistory.push({
                taskId: task.id,
                title: task.title,
                completedAt: task.finishedAt,
                xpGained: xpGain,
                coinsGained: coinGain
            });
            
            showToast(`✅ Completed: ${task.title} (+${xpGain} XP, +${coinGain} coins)`);
            updateXPLevel();
            saveState();
            renderMissions();
        }
        
        function renderMissions() {
            const container = document.getElementById('missionList');
            if (!container) {
                console.error('missionList element not found!');
                return;
            }
            
            const activeTasks = state.activeTasks.filter(t => !t.completed);
            
            if (activeTasks.length === 0) {
                container.innerHTML = '<div style="background:#111113; padding:20px; border-radius:8px;">✨ All done! Great work! ✨</div>';
                return;
            }
            
            container.innerHTML = activeTasks.map(task => `
                <div class="mission-card" data-task-id="${task.id}">
                    <div class="mission-title">${escapeHtml(task.title)}</div>
                    <div class="mission-meta">${task.domain} | ${task.difficulty} | ${task.xp} XP</div>
                    <ul class="step-list">
                        ${task.steps.map((step, idx) => `
                            <li class="step-item ${step.completed ? 'completed' : ''}" data-step-index="${idx}">
                                <input type="checkbox" class="step-checkbox" ${step.completed ? 'checked' : ''}>
                                <label>${escapeHtml(step.text)}</label>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
            
            // Attach checkbox event listeners
            document.querySelectorAll('.step-checkbox').forEach(checkbox => {
                checkbox.removeEventListener('change', handleCheckboxChange);
                checkbox.addEventListener('change', handleCheckboxChange);
            });
            
            console.log('Rendered', activeTasks.length, 'missions');
        }
        
        function handleCheckboxChange(e) {
            const checkbox = e.target;
            const li = checkbox.closest('.step-item');
            const stepIndex = parseInt(li.dataset.stepIndex);
            const missionCard = li.closest('.mission-card');
            const taskId = missionCard.dataset.taskId;
            
            const task = state.activeTasks.find(t => t.id === taskId);
            if (task && task.steps[stepIndex]) {
                task.steps[stepIndex].completed = checkbox.checked;
                
                if (checkbox.checked) {
                    li.classList.add('completed');
                } else {
                    li.classList.remove('completed');
                }
                
                updateTaskCompletion(task);
                saveState();
                updateXPBar();
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Initialize
        function init() {
            console.log('Initializing app...');
            loadState();
            renderMissions();
            console.log('App ready!');
        }
        
        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
